# compose.yml — runtime na VPS CodeUP, registrado no Traefik via file-provider
# (NÃO usa labels Docker — a config Traefik mora em /etc/easypanel/traefik/config/lp-horizon.yml,
#  versionada em infra/traefik/lp-horizon.yml deste repo).

services:
  lp-horizon:
    image: ghcr.io/horizonconsultoria-br/lp-horizon:latest
    container_name: lp-horizon
    restart: unless-stopped
    networks:
      - easypanel
    environment:
      NODE_ENV: production
      PORT: "3000"
      # GA4 — preencher quando founder criar a property
      NEXT_PUBLIC_GA_ID: ${NEXT_PUBLIC_GA_ID:-}
      # Cal.com / Google Calendar do CTO
      NEXT_PUBLIC_CAL_URL: ${NEXT_PUBLIC_CAL_URL:-}
      # Resend — reusar a key da Horizon (Carol da CodeUP usa uma)
      RESEND_API_KEY: ${RESEND_API_KEY}
      LEAD_INBOX_EMAIL: ${LEAD_INBOX_EMAIL:-r.almeidagustavo@gmail.com}
      LEAD_FROM_EMAIL: ${LEAD_FROM_EMAIL:-leads@consultoriahorizon.com.br}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  easypanel:
    external: true
