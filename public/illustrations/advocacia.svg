<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Balança da justiça estilizada -->
  <defs>
    <linearGradient id="advGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="200" height="200" rx="16" fill="url(#advGrad)" stroke="none"/>
  <!-- pilar -->
  <line x1="100" y1="40" x2="100" y2="160"/>
  <!-- base -->
  <line x1="70" y1="160" x2="130" y2="160"/>
  <line x1="80" y1="170" x2="120" y2="170"/>
  <!-- braço -->
  <line x1="50" y1="60" x2="150" y2="60"/>
  <!-- cabos -->
  <line x1="55" y1="60" x2="40" y2="100"/>
  <line x1="55" y1="60" x2="70" y2="100"/>
  <line x1="145" y1="60" x2="130" y2="100"/>
  <line x1="145" y1="60" x2="160" y2="100"/>
  <!-- pratos -->
  <path d="M 30 100 Q 55 120 80 100 Z" fill="#fbbf24" fill-opacity="0.15"/>
  <path d="M 120 100 Q 145 120 170 100 Z" fill="#fbbf24" fill-opacity="0.35"/>
  <!-- top -->
  <circle cx="100" cy="38" r="5" fill="#fbbf24" stroke="none"/>
  <!-- nodes IA simbolizando agente -->
  <g stroke-width="1" opacity="0.7">
    <circle cx="155" cy="105" r="3" fill="#fbbf24" stroke="none"/>
    <circle cx="135" cy="115" r="2" fill="#fbbf24" stroke="none"/>
    <line x1="155" y1="105" x2="135" y2="115"/>
  </g>
</svg>
