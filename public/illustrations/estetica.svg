  <line x1="75" y1="60" x2="135" y2="60" stroke-width="2"/>
  <line x1="75" y1="73" x2="125" y2="73" opacity="0.7"/>
  <line x1="75" y1="86" x2="130" y2="86" opacity="0.5"/>
  <line x1="75" y1="99" x2="115" y2="99" opacity="0.5"/>
  <!-- spark IA -->
  <g transform="translate(150, 75)">
