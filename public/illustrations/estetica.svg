      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="200" height="200" rx="16" fill="url(#estGrad)" stroke="none"/>
  <!-- WhatsApp bubble principal -->
  <path d="M 60 50 L 60 110 Q 60 120 70 120 L 110 120 L 130 140 L 125 120 L 140 120 Q 150 120 150 110 L 150 50 Q 150 40 140 40 L 70 40 Q 60 40 60 50 Z" fill="#0b0d12"/>
