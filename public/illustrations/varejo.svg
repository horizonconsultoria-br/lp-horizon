<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <linearGradient id="varGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="200" height="200" rx="16" fill="url(#varGrad)" stroke="none"/>

  <!-- Sacola de compras -->
  <path d="M 60 80 L 70 60 L 130 60 L 140 80 Z" fill="#0b0d12"/>
  <rect x="60" y="80" width="80" height="80" rx="4" fill="#0b0d12"/>
  <!-- alças -->
  <path d="M 80 80 Q 80 50 100 50 Q 120 50 120 80" stroke-width="2"/>
  <!-- crescimento (barras dentro da sacola) -->
  <rect x="72" y="125" width="10" height="25" fill="#fbbf24" opacity="0.6" stroke="none"/>
  <rect x="88" y="115" width="10" height="35" fill="#fbbf24" opacity="0.75" stroke="none"/>
  <rect x="104" y="105" width="10" height="45" fill="#fbbf24" opacity="0.9" stroke="none"/>
  <rect x="120" y="95" width="10" height="55" fill="#fbbf24" opacity="1" stroke="none"/>
  <!-- seta de crescimento -->
  <path d="M 75 100 L 130 75" stroke-width="2"/>
  <path d="M 125 73 L 130 75 L 128 80" stroke-width="2"/>
  <!-- spark IA superior direito -->
  <g transform="translate(155, 50)">
    <circle r="12" fill="#0b0d12" stroke="#fbbf24"/>
    <path d="M 0 -6 L 2 -2 L 6 0 L 2 2 L 0 6 L -2 2 L -6 0 L -2 -2 Z" fill="#fbbf24" stroke="none"/>
  </g>
</svg>
